name: Test

on:
  push:
    branches: ["master"]
    paths:
      - "**/*.rs"
  pull_request:
    branches: ["master"]
    paths:
      - "**/*.rs"

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Run tests
        run: cargo test --verbose --all-targets

name: Build

on:
  push:
    branches: ["master"]
    paths:
      - "**/*.rs"
  pull_request:
    branches: ["master"]
    paths:
      - "**/*.rs"

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        profile:
          - name: default
            cargo_args: ""
          - name: jit
            cargo_args: "--features jit"
    runs-on: ubuntu-latest
    name: build (${{ matrix.profile.name }})

    steps:
      - uses: actions/checkout@v4
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Build
        run: cargo build --verbose ${{ matrix.profile.cargo_args }}
